services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      BACKEND_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
